[pytest]
# =============================================================================
# Blitzy Platform API Test Suite — Pytest Configuration
# =============================================================================
# Configures test discovery, custom markers, timeouts, output formatting,
# and logging for the percent_complete field validation test suite targeting
# GET /runs/metering, GET /runs/metering/current, and GET /project endpoints.
# =============================================================================

# ---------------------------------------------------------------------------
# Test Discovery
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Custom Markers
# ---------------------------------------------------------------------------
# Each marker corresponds to a logical test category from the test plan.
# --strict-markers in addopts ensures typos in marker names cause errors.
markers =
    requires_active_run: Test requires an active in-progress code generation run
    runs_metering: Tests for GET /runs/metering endpoint
    runs_metering_current: Tests for GET /runs/metering/current endpoint
    project: Tests for GET /project endpoint
    cross_api: Cross-API consistency tests
    edge_cases: Boundary condition and negative scenario tests

# ---------------------------------------------------------------------------
# Timeout Settings (pytest-timeout plugin)
# ---------------------------------------------------------------------------
# Default 30-second timeout per test prevents hung tests during API call
# failures or network issues. Individual tests may override via
# @pytest.mark.timeout(seconds) when longer waits are justified.
timeout = 30

# ---------------------------------------------------------------------------
# Strict Mode
# ---------------------------------------------------------------------------
# Markers not registered in the markers section above raise errors during
# collection, catching typos and undeclared marks before tests execute.
strict_markers = true

# ---------------------------------------------------------------------------
# Output Formatting
# ---------------------------------------------------------------------------
# -v            : Verbose output showing individual test names and results
# --tb=short    : Short tracebacks for concise failure diagnostics
# --strict-markers : Reinforces strict_markers via CLI flag for explicitness
addopts = -v --tb=short --strict-markers

# ---------------------------------------------------------------------------
# Live Logging
# ---------------------------------------------------------------------------
# Enable real-time log output to the console during test execution.
# Useful for monitoring API request/response flow and debugging failures.
log_cli = true
log_cli_level = INFO
